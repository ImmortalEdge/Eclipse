# SearXNG settings
use_default_settings: true

server:
  port: 8081
  bind_address: "0.0.0.0"
  secret_key: "eclipse_research_secret_key_123" # Changed to avoid crash
  base_url: false
  image_proxy: true

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: w
